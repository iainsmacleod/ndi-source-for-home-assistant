# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: NDI Bridge
description: Receives NDI streams and serves them as MJPEG with discovery API for the NDI Camera integration.
version: "1.0.0"
slug: ndi_bridge
url: "https://github.com/iainsmacleod/ndi-source-for-home-assistant/tree/main/ndi_bridge"
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
host_network: true
host_dbus: true
options:
  port: 8080
  source_name: ""
  discovery_server: ""
schema:
  port: "int?"
  source_name: "str?"
  discovery_server: "str?"
